<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SBMM ABP Soil Contamination Visualizer</title>

<!-- ============================== CDN LIBRARIES ============================== -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://unpkg.com/chart.js@4.4.1/dist/chart.umd.js"></script>

<style>
/* ============================== LAYOUT / THEME ============================== */
:root{
  --bg:#f4f5f7; --panel:#ffffff; --ink:#1f2933; --muted:#6b7280;
  --line:#d7dbe0; --accent:#1f6feb; --accent-dk:#1450b0;
  --red:#d7191c; --green:#1a9641; --gray:#9e9e9e; --amber:#f0ad4e;
  --topbar:#1d2733;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:var(--bg);overflow:hidden;font-size:13px}

/* Top bar */
#topbar{position:absolute;top:0;left:0;right:0;height:46px;background:var(--topbar);color:#fff;
  display:flex;align-items:center;gap:14px;padding:0 14px;z-index:1200;box-shadow:0 1px 4px rgba(0,0,0,.3)}
#topbar h1{font-size:15px;font-weight:600;margin:0;white-space:nowrap}
#topbar .proj-tag{font-size:11px;color:#9fb3c8;border:1px solid #3a4a5c;border-radius:4px;padding:2px 7px;white-space:nowrap}
#topbar .spacer{flex:1}
#unvalidated{background:#b91c1c;color:#fff;font-weight:700;font-size:11px;letter-spacing:.5px;
  padding:4px 9px;border-radius:4px;animation:pulseBadge 2.4s ease-in-out infinite}
@keyframes pulseBadge{0%,100%{opacity:1}50%{opacity:.55}}
#topbar select{background:#2b3a4d;color:#fff;border:1px solid #3a4a5c;border-radius:4px;padding:4px 6px;font-size:12px}

/* Left panel */
#panel{position:absolute;top:46px;left:0;bottom:0;width:330px;background:var(--panel);
  border-right:1px solid var(--line);overflow-y:auto;z-index:1100;transition:transform .2s ease;padding-bottom:40px}
#panel.collapsed{transform:translateX(-330px)}
#panelToggle{position:absolute;top:54px;left:330px;z-index:1101;background:var(--panel);
  border:1px solid var(--line);border-left:none;border-radius:0 6px 6px 0;width:22px;height:46px;
  cursor:pointer;font-size:14px;line-height:46px;text-align:center;transition:left .2s ease;color:var(--muted)}
#panel.collapsed ~ #panelToggle{left:0}

.section{border-bottom:1px solid var(--line)}
.section > h2{margin:0;padding:9px 12px;font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;color:var(--muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  user-select:none;background:#fafbfc}
.section > h2:hover{background:#f0f2f5}
.section > h2 .chev{transition:transform .15s ease}
.section.closed > h2 .chev{transform:rotate(-90deg)}
.section .body{padding:10px 12px}
.section.closed .body{display:none}

label.field{display:block;margin:7px 0 3px;font-size:11px;font-weight:600;color:var(--muted)}
select,input[type=text],input[type=number]{width:100%;padding:5px 7px;border:1px solid var(--line);
  border-radius:5px;font-size:12px;background:#fff;color:var(--ink)}
.row{display:flex;gap:8px;align-items:center}
.row > *{flex:1}
.checkrow{display:flex;align-items:center;gap:7px;margin:5px 0;font-size:12px;cursor:pointer}
.checkrow input{flex:none;width:auto}
.btn{display:inline-block;padding:6px 10px;border:1px solid var(--line);border-radius:5px;background:#fff;
  cursor:pointer;font-size:12px;color:var(--ink);text-align:center}
.btn:hover{background:#f0f2f5}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-dk)}
.hint{font-size:11px;color:var(--muted);margin:4px 0}

/* Map */
#map{position:absolute;top:46px;left:0;right:0;bottom:0;z-index:1}
.with-panel #map{left:330px}

/* Legend */
#legend{position:absolute;bottom:22px;right:12px;z-index:1000;background:rgba(255,255,255,.96);
  border:1px solid var(--line);border-radius:7px;box-shadow:0 2px 10px rgba(0,0,0,.18);
  padding:10px 12px;min-width:170px;max-width:240px;font-size:12px}
#legend h3{margin:0 0 6px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
#legend.closed .legend-body{display:none}
.legend-row{display:flex;align-items:center;gap:8px;margin:3px 0}
.legend-swatch{width:14px;height:14px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,.25)}
.legend-ramp{height:12px;width:100%;border-radius:3px;border:1px solid rgba(0,0,0,.2);margin:4px 0}
.legend-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.legend-shape{display:inline-block;width:16px;text-align:center}
.legend-note{font-size:10px;color:var(--muted);margin-top:6px;border-top:1px solid var(--line);padding-top:5px}

/* Sample marker labels */
.sample-label{background:rgba(255,255,255,.82);border:1px solid rgba(0,0,0,.2);border-radius:3px;
  padding:0 3px;font-size:10px;font-weight:600;color:#111;white-space:nowrap;box-shadow:none}
.sample-label.leaflet-tooltip-left:before,.sample-label.leaflet-tooltip-right:before{display:none}

/* Popups */
.leaflet-popup-content{margin:10px 12px;max-height:340px;overflow:auto}
.popup{font-size:12px;line-height:1.45}
.popup h4{margin:0 0 5px;font-size:13px}
.popup table{border-collapse:collapse;width:100%;margin:4px 0}
.popup td{padding:1px 5px 1px 0;vertical-align:top}
.popup td.k{color:var(--muted);white-space:nowrap}
.popup .exc-yes{color:var(--red);font-weight:700}
.popup .exc-no{color:var(--green);font-weight:700}
.popup .exc-ns{color:var(--gray);font-weight:700}
.popup .copybtn{margin-top:6px;font-size:11px;padding:3px 7px}

/* North arrow + title block (for export) */
#northArrow{position:absolute;top:58px;right:14px;z-index:1000;width:42px;height:52px;
  background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:6px;text-align:center;
  font-size:10px;font-weight:700;color:#333;padding-top:3px;box-shadow:0 1px 5px rgba(0,0,0,.15)}
#northArrow svg{display:block;margin:1px auto 0}
#titleBlock{position:absolute;top:58px;left:344px;z-index:1000;background:rgba(255,255,255,.95);
  border:1px solid var(--line);border-radius:6px;padding:7px 11px;box-shadow:0 1px 6px rgba(0,0,0,.15);
  max-width:360px;display:none}
.with-panel #titleBlock{left:344px}
body:not(.with-panel) #titleBlock{left:14px}
#titleBlock.show{display:block}
#titleBlock .tb-title{font-size:14px;font-weight:700;outline:none}
#titleBlock .tb-sub{font-size:11px;color:var(--muted);outline:none}

/* cursor coords */
#coords{position:absolute;bottom:0;left:340px;z-index:1000;background:rgba(255,255,255,.9);
  border:1px solid var(--line);border-bottom:none;border-left:none;border-radius:0 6px 0 0;
  padding:2px 8px;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
body:not(.with-panel) #coords{left:0}

.stats-table{width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums}
.stats-table th,.stats-table td{border:1px solid var(--line);padding:2px 5px;text-align:right}
.stats-table th{background:#fafbfc;text-align:center}
.stats-table td.an{text-align:left;font-weight:600}
.statline{display:flex;justify-content:space-between;margin:2px 0}
.statline b{font-variant-numeric:tabular-nums}

.swatch-mini{width:11px;height:11px;display:inline-block;border-radius:2px;border:1px solid rgba(0,0,0,.3);vertical-align:-1px}
.leaflet-pm-toolbar .leaflet-pm-icon-text{}
</style>
</head>
<body class="with-panel">

<!-- ============================== TOP BAR ============================== -->
<div id="topbar">

        <label class="field">Threshold set</label>
        <div class="row">
          <select id="criterion">
            <option value="ROD">ROD remediation goal</option>
            <option value="PMB">PMB / background</option>

      </div>

      <label class="checkrow"><input type="checkbox" id="showLabels"> Show ID labels</label>
      <label class="checkrow"><input type="checkbox" id="logScale" checked> Log color scale (Hg)</label>

  </div>

</div>
<div id="panelToggle" title="Collapse / expand panel">‹</div>

<!-- ============================== MAP & OVERLAYS ============================== -->
<div id="map"></div>

<div id="northArrow">

</div>

<div id="titleBlock">

</div>

<div id="legend">
  <h3 id="legendHead">Legend <span class="legend-collapse">▾</span></h3>
  <div class="legend-body" id="legendBody"></div>
</div>

}

/* =========================================================================
   SECTION 3 — COLOR SCALES & THRESHOLDS
   ========================================================================= */
// semantic colors for exceedance modes
const SEM = { yes:'#d7191c', no:'#1a9641', ns:'#9e9e9e' };
// concentration ramp (blue-low -> red-high)
const RAMP = ['#2c7bb6','#abd9e9','#ffffbf','#fdae61','#d7191c'];

function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
  const ar=ah>>16, ag=(ah>>8)&255, ab=ah&255;
  const br=bh>>16, bg=(bh>>8)&255, bb=bh&255;
  const r=Math.round(ar+(br-ar)*t), g=Math.round(ag+(bg-ag)*t), bl=Math.round(ab+(bb-ab)*t);
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}
// map normalized t in [0,1] onto the multi-stop ramp
function rampColor(t){
  if(t<=0) return RAMP[0];
  if(t>=1) return RAMP[RAMP.length-1];
  const seg = t*(RAMP.length-1);
  const i = Math.floor(seg);
  return lerpColor(RAMP[i], RAMP[i+1], seg-i);
}

// domain (min/max) of an analyte across sampled points, for the concentration ramp
function analyteDomain(an){
  const vals = DATA.features.map(f=>num(f.properties[an])).filter(v=>v!==null && v>0);
  if(!vals.length) return [0,1];
  return [Math.min(...vals), Math.max(...vals)];
}
// normalize a concentration to [0,1] (log-aware for Hg or when logScale on)
function normConc(v, an){
  if(!isNum(v) || v<=0) return null;
  const [lo,hi] = analyteDomain(an);
  if(hi<=lo) return 0.5;
  const useLog = STATE.logScale && (an==='Hg');
  if(useLog){
    const llo=Math.log10(Math.max(lo,1e-6)), lhi=Math.log10(hi);
    return (Math.log10(v)-llo)/(lhi-llo);
  }
  return (v-lo)/(hi-lo);
}
// ratio to active threshold; >1 = exceedance
function ratioToThreshold(v, an){
  const thr = CRITERIA[STATE.criterion][an];
  if(!isNum(v) || !isNum(thr) || thr<=0) return null;
  return v/thr;
}

// driver classification for "Driving COC" mode
function driverColor(p){
  const ex = STATE.criterion==='ROD' ? p.rod_exceed : p.pmb_exceed;
  const dr = STATE.criterion==='ROD' ? p.rod_drivers : p.pmb_drivers;
  if(ex==='NOT SAMPLED' || !p.sampled) return SEM.ns;
  if(ex!=='YES' || !dr) return '#1a9641';                  // passes -> green
  const hasHg = /Hg/.test(dr), hasAs = /As/.test(dr);
  if(hasHg && hasAs) return '#7b3294';                      // both -> purple
  if(hasHg) return '#d7191c';                               // Hg -> red
  if(hasAs) return '#fdae61';                               // As -> orange
  return '#2c7bb6';                                         // Sb/Tl only -> blue
}

// MASTER: fill color for a feature under the active color-by mode
function fillFor(p){
  if(!p.sampled) return null;                  // hollow handled by renderer
  switch(STATE.colorBy){
    case 'rod': return p.rod_exceed==='YES'?SEM.yes : p.rod_exceed==='NO'?SEM.no : SEM.ns;
    case 'pmb': return p.pmb_exceed==='YES'?SEM.yes : p.pmb_exceed==='NO'?SEM.no : SEM.ns;
    case 'round': return p.round===1 ? '#2b8cbe' : '#e6550d';
    case 'driver': return driverColor(p);
    case 'conc': {
      const t = normConc(num(p[STATE.analyte]), STATE.analyte);
      return t===null ? '#cccccc' : rampColor(t);
    }
    case 'ratio': {
      const r = ratioToThreshold(num(p[STATE.analyte]), STATE.analyte);
      if(r===null) return '#cccccc';
      // 0..2x mapped onto ramp, clamp; 1x sits mid-ramp
      return rampColor(Math.max(0,Math.min(1, r/2)));
    }
  }
  return SEM.ns;
}

/* =========================================================================
   SECTION 4 — SAMPLE LAYER (SVG markers, popups, labels)
   ========================================================================= */
const sampleLayer = L.layerGroup().addTo(map);
const markerById = {};   // id -> marker

function svgMarker(p){
  const fill = fillFor(p);
  const sampled = p.sampled;
  const stroke = sampled ? '#222' : '#777';
  const dash = sampled ? '' : 'stroke-dasharray="3,2"';
  const fillCol = sampled ? (fill||'#cccccc') : 'none';     // not-sampled = hollow
  const fillOp = sampled ? 0.92 : 0;
  const sh = shapeOf(p);
  const S = 22, c = S/2, r = 7;
  let body='';
  if(sh==='circle')      body = `<circle cx="${c}" cy="${c}" r="${r}" fill="${fillCol}" fill-opacity="${fillOp}" stroke="${stroke}" stroke-width="1.6" ${dash}/>`;
  else if(sh==='square') body = `<rect x="${c-r}" y="${c-r}" width="${2*r}" height="${2*r}" fill="${fillCol}" fill-opacity="${fillOp}" stroke="${stroke}" stroke-width="1.6" ${dash}/>`;
  else                   body = `<polygon points="${c},${c-r-1} ${c+r+1},${c+r} ${c-r-1},${c+r}" fill="${fillCol}" fill-opacity="${fillOp}" stroke="${stroke}" stroke-width="1.6" ${dash}/>`;
  // deep-sample accent: small inner ring
  const accent = hasDeep(p) ? `<circle cx="${c}" cy="${c}" r="2.4" fill="#111" stroke="#fff" stroke-width="0.8"/>` : '';
  const html = `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" style="overflow:visible">${body}${accent}</svg>`;
  return L.divIcon({ className:'sample-icon', html, iconSize:[S,S], iconAnchor:[c,c] });
}

function popupHtml(p){
  const ex = (v)=> v==='YES'?'<span class="exc-yes">YES</span>'
                 : v==='NO'?'<span class="exc-no">NO</span>'
                 : '<span class="exc-ns">'+(v||'—')+'</span>';
  const fmt = v => isNum(v) ? v.toLocaleString() : '—';
  const arow = an => {
    const sh = p[an], dp = p[an+'_deep'];
    return `<tr><td class="k">${an}</td><td>${fmt(sh)}${isNum(dp)?` <span style="color:#888">/ deep ${fmt(dp)}</span>`:''} ${UNITS}</td></tr>`;
  };
  let rows = ANALYTES.map(arow).join('');
  const omRow = isNum(p.Hg_OM) ? `<tr><td class="k">Hg (OM)</td><td>${fmt(p.Hg_OM)} ${UNITS}${p.OM_effect?` · ${p.OM_effect}`:''}</td></tr>` : '';
  const txt = [
    `Sample ${p.id} (Round ${p.round})`,
    p.coord_source?`Coord source: ${p.coord_source}`:'',
    `Sampled: ${p.sampled?'yes':'no'}`,
    ...ANALYTES.map(a=>`${a}: ${fmt(p[a])}${isNum(p[a+'_deep'])?` / deep ${fmt(p[a+'_deep'])}`:''} ${UNITS}`),
    isNum(p.Hg_OM)?`Hg(OM): ${fmt(p.Hg_OM)} (${p.OM_effect||''})`:'',
    `ROD: ${p.rod_exceed}${p.rod_drivers?` [${p.rod_drivers}]`:''}`,
    `PMB: ${p.pmb_exceed||'—'}${p.pmb_drivers?` [${p.pmb_drivers}]`:''}`,
    p.depth?`Depth: ${p.depth}`:'',
    p.field_note?`Field note: ${p.field_note}`:'',
    p.notes?`Notes: ${p.notes}`:'',
    p.not_sampled_reason?`Not sampled: ${p.not_sampled_reason}`:''
  ].filter(Boolean).join('\n');
  return `<div class="popup">
    <h4>${p.id} <span style="font-weight:400;color:#888">· Round ${p.round} · ${shapeOf(p)}</span></h4>
    <table>
      ${p.coord_source?`<tr><td class="k">Coord src</td><td>${p.coord_source}</td></tr>`:''}
      <tr><td class="k">Sampled</td><td>${p.sampled?'Yes':'No'}</td></tr>
      ${p.depth?`<tr><td class="k">Depth</td><td>${p.depth}</td></tr>`:''}
      ${rows}${omRow}
      <tr><td class="k">ROD</td><td>${ex(p.rod_exceed)}${p.rod_drivers?` <span style="color:#888">[${p.rod_drivers}]</span>`:''}</td></tr>
      <tr><td class="k">PMB</td><td>${ex(p.pmb_exceed)}${p.pmb_drivers?` <span style="color:#888">[${p.pmb_drivers}]</span>`:''}</td></tr>
      ${p.has_fd==='Yes'?'<tr><td class="k">Field dup</td><td>Yes</td></tr>':''}
      ${p.field_note?`<tr><td class="k">Field note</td><td>${p.field_note}</td></tr>`:''}
      ${p.notes?`<tr><td class="k">Notes</td><td>${p.notes}</td></tr>`:''}
      ${p.not_sampled_reason?`<tr><td class="k">Not sampled</td><td>${p.not_sampled_reason}</td></tr>`:''}
    </table>
    <button class="btn copybtn" onclick='navigator.clipboard&&navigator.clipboard.writeText(${JSON.stringify(txt)})'>Copy details</button>
  </div>`;
}

function buildMarkers(){
  sampleLayer.clearLayers();
  for(const k in markerById) delete markerById[k];
  DATA.features.forEach(f=>{
    const p = f.properties;
    const [lon,lat] = f.geometry.coordinates;
    const m = L.marker([lat,lon], { icon:svgMarker(p), pane:'markerPane' });
    m.featureProps = p;
    m.bindPopup(()=>popupHtml(p), { maxWidth:320, minWidth:230 });
    if(STATE.showLabels){
      m.bindTooltip(p.id, { permanent:true, direction:'right', className:'sample-label', offset:[8,0] });
    }
    m.addTo(sampleLayer);
    markerById[p.id] = m;
  });
}

// refresh marker styling only (cheaper than rebuild but rebuild is fine at n=94)
function refreshMarkers(){ buildMarkers(); }

/* =========================================================================
   SECTION 5 — DYNAMIC LEGEND
   ========================================================================= */
function shapeGlyph(){
  return `<div class="legend-note">
    <div><span class="legend-shape">●</span> Round 1 &nbsp; <span class="legend-shape">■</span> Round 2 &nbsp; <span class="legend-shape">▲</span> Opportunistic (OS)</div>
    <div><span class="legend-shape">◌</span> Hollow/dashed = not sampled &nbsp; <span class="legend-shape">⦿</span> dot = has deep sample</div>
  </div>`;
}
function swatch(c){ return `<span class="legend-swatch" style="background:${c}"></span>`; }

function buildLegend(){
  const body = document.getElementById('legendBody');
  const an = STATE.analyte, crit = STATE.criterion;
  let html = '';
  if(STATE.colorBy==='rod' || STATE.colorBy==='pmb'){
    const set = STATE.colorBy==='rod' ? 'ROD' : 'PMB';
    html = `<div style="font-weight:600;margin-bottom:4px">${set} exceedance</div>
      <div class="legend-row">${swatch(SEM.yes)} Exceeds ${set}</div>
      <div class="legend-row">${swatch(SEM.no)} Below ${set}</div>
      <div class="legend-row">${swatch(SEM.ns)} Not sampled</div>`;
  } else if(STATE.colorBy==='round'){
    html = `<div style="font-weight:600;margin-bottom:4px">Sampling round</div>
      <div class="legend-row">${swatch('#2b8cbe')} Round 1</div>
      <div class="legend-row">${swatch('#e6550d')} Round 2</div>`;
  } else if(STATE.colorBy==='driver'){
    html = `<div style="font-weight:600;margin-bottom:4px">Driving COC (${crit})</div>
      <div class="legend-row">${swatch('#d7191c')} Hg drives</div>
      <div class="legend-row">${swatch('#fdae61')} As drives</div>
      <div class="legend-row">${swatch('#7b3294')} Hg + As</div>
      <div class="legend-row">${swatch('#2c7bb6')} Sb/Tl only</div>
      <div class="legend-row">${swatch('#1a9641')} Passes</div>
      <div class="legend-row">${swatch(SEM.ns)} Not sampled</div>`;
  } else if(STATE.colorBy==='conc'){
    const [lo,hi] = analyteDomain(an);
    const grad = `linear-gradient(to right, ${RAMP.join(',')})`;
    const useLog = STATE.logScale && an==='Hg';
    html = `<div style="font-weight:600;margin-bottom:4px">${ANALYTE_LABEL[an]} ${UNITS}${useLog?' · log':''}</div>
      <div class="legend-ramp" style="background:${grad}"></div>
      <div class="legend-scale"><span>${lo}</span><span>${hi}</span></div>
      <div class="legend-row" style="margin-top:5px">${swatch('#cccccc')} no data</div>`;
  } else if(STATE.colorBy==='ratio'){
    const thr = CRITERIA[crit][an];
    const grad = `linear-gradient(to right, ${RAMP.join(',')})`;
    html = `<div style="font-weight:600;margin-bottom:4px">${an} ÷ ${crit} (${thr} ${UNITS})</div>
      <div class="legend-ramp" style="background:${grad}"></div>
      <div class="legend-scale"><span>0×</span><span>1× (line)</span><span>≥2×</span></div>
      <div class="legend-row" style="margin-top:5px">${swatch('#cccccc')} no data</div>`;
  }
  body.innerHTML = html + shapeGlyph();
}

/* =========================================================================
   SECTION 6 — UI WIRING (Phase 1)
   ========================================================================= */
function syncControlVisibility(){
  const needAnalyte = ['conc','ratio'].includes(STATE.colorBy);
  const needCrit = ['ratio','driver'].includes(STATE.colorBy);
  document.getElementById('analyteWrap').style.display = needAnalyte ? '' : 'none';
  document.getElementById('criterionWrap').style.display = needCrit ? '' : 'none';
}
function applyDisplay(){
  syncControlVisibility();
  refreshMarkers();
  buildLegend();
}

document.getElementById('colorBy').addEventListener('change', e=>{ STATE.colorBy=e.target.value; applyDisplay(); });
document.getElementById('analyte').addEventListener('change', e=>{ STATE.analyte=e.target.value; applyDisplay(); });
document.getElementById('criterion').addEventListener('change', e=>{ STATE.criterion=e.target.value; applyDisplay(); });
document.getElementById('showLabels').addEventListener('change', e=>{ STATE.showLabels=e.target.checked; refreshMarkers(); });
document.getElementById('logScale').addEventListener('change', e=>{ STATE.logScale=e.target.checked; applyDisplay(); });

// panel collapse
document.getElementById('panelToggle').addEventListener('click', ()=>{
  const panel=document.getElementById('panel');
  panel.classList.toggle('collapsed');
  document.body.classList.toggle('with-panel', !panel.classList.contains('collapsed'));
  document.getElementById('panelToggle').textContent = panel.classList.contains('collapsed') ? '›' : '‹';
  setTimeout(()=>map.invalidateSize(), 220);
});
// section collapse
document.querySelectorAll('.section > h2').forEach(h=>{
  h.addEventListener('click', ()=>h.parentElement.classList.toggle('closed'));
});
// legend collapse
document.getElementById('legendHead').addEventListener('click', ()=>{
  document.getElementById('legend').classList.toggle('closed');
});

/* =========================================================================
   SECTION 7 — INIT
   ========================================================================= */
function fitToData(){
  const pts = DATA.features.map(f=>[f.geometry.coordinates[1], f.geometry.coordinates[0]]);
  map.fitBounds(L.latLngBounds(pts), { padding:[40,40] });
}
buildMarkers();
buildLegend();
syncControlVisibility();
fitToData();

console.log('[ABP] loaded', DATA.features.length, 'features; criteria=', CRITERIA);
</script>
